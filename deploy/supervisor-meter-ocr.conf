[program:meter-ocr]
directory=/www/wwwroot/meter-ocr
command=/www/wwwroot/meter-ocr/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8080
autostart=true
autorestart=true
startsecs=10
startretries=3
user=www
redirect_stderr=true
stdout_logfile=/www/wwwlogs/meter-ocr.log
environment=METER_OCR_HOST="127.0.0.1",METER_OCR_PORT="8080"
